name: Build Theme ZIP
on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ['v*']
permissions: {contents: read}
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: {node-version-file: '.nvmrc', cache: npm}
      - run: npm ci
      - run: npm run build
      - name: Package theme
        run: |
          mkdir -p release
          cd theme
          zip -qr ../release/digital-products-pro.zip digital-products-pro -x "digital-products-pro/.DS_Store" -x "digital-products-pro/**/*.map"
      - uses: actions/upload-artifact@v4
        with:
          name: digital-products-pro-theme
          path: release/digital-products-pro.zip
          retention-days: 30
          if-no-files-found: error
