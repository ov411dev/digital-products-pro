services:
  db:
    image: mariadb:11.8
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${DB_NAME:-wordpress}
      MARIADB_USER: ${DB_USER:-wordpress}
      MARIADB_PASSWORD: ${DB_PASSWORD:-wordpress}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-change-me}
    volumes: [db_data:/var/lib/mysql]
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
  wordpress:
    image: wordpress:php8.2-fpm
    restart: unless-stopped
    depends_on:
      db: {condition: service_healthy}
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: ${DB_NAME:-wordpress}
      WORDPRESS_DB_USER: ${DB_USER:-wordpress}
      WORDPRESS_DB_PASSWORD: ${DB_PASSWORD:-wordpress}
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_DEBUG', true);
        define('WP_DEBUG_LOG', true);
        define('WP_DEBUG_DISPLAY', false);
        define('WP_ENVIRONMENT_TYPE', 'local');
        define('WP_REDIS_HOST', 'redis');
    volumes:
      - wordpress_data:/var/www/html
      - ../theme/digital-products-pro:/var/www/html/wp-content/themes/digital-products-pro
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on: [wordpress]
    ports: ["${WORDPRESS_PORT:-8080}:80"]
    volumes:
      - wordpress_data:/var/www/html:ro
      - ../theme/digital-products-pro:/var/www/html/wp-content/themes/digital-products-pro:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
  redis:
    image: redis:7-alpine
    restart: unless-stopped
  phpmyadmin:
    image: phpmyadmin:latest
    restart: unless-stopped
    depends_on:
      db: {condition: service_healthy}
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: ${DB_ROOT_PASSWORD:-change-me}
    ports: ["${PHPMYADMIN_PORT:-8081}:80"]
  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports: ["${MAILPIT_PORT:-8025}:8025"]
volumes:
  db_data:
  wordpress_data:
